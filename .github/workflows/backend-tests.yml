name: Backend · tests

# Corre en push a main y en cualquier PR que toque el plugin.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  phpunit:
    name: PHPUnit · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # El plugin exige PHP 8.1+. Cubrimos esa base y la versión mayor
        # actualmente más desplegada en producción (8.2).
        php: ['8.1', '8.2']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, mysqli, zip, xml, curl
          tools: composer:v2
          coverage: none

      - name: Install subversion
        # La test-lib oficial de WP se distribuye por svn. Ubuntu runners
        # no traen svn preinstalado en versiones recientes.
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install WP test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 latest

      - name: PHP lint
        run: |
          set -e
          find flavor-news-hub.php uninstall.php src -name "*.php" -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: PHPUnit
        run: vendor/bin/phpunit
