name: Release · APK + plugin ZIP on tag

# Se dispara al empujar un tag con forma vX.Y.Z. Compila el APK de
# release firmado con la keystore de producción (inyectada desde
# secrets) y publica una Release en GitHub con el APK adjunto.
#
# Requisitos en Settings → Secrets → Actions:
#   ANDROID_KEYSTORE_BASE64    → keystore completa codificada en base64
#   ANDROID_KEYSTORE_PASSWORD  → password del store
#   ANDROID_KEY_ALIAS          → alias del par de claves (p. ej. flavor-news-hub)
#   ANDROID_KEY_PASSWORD       → password del par de claves
#
# Si falta alguno, el paso de firma falla y no se publica la release.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  # Necesario para que `gh release create` (vía softprops) pueda
  # crear la release y subir assets al repositorio.
  contents: write

jobs:
  release:
    name: Build release APK and publish
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        # Misma versión que app-build.yml para reproducibilidad — si
        # aquella pasa, ésta también debería compilar limpio.
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate freezed + json_serializable
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        # El secret viene en base64; lo decodificamos dentro del
        # módulo `app/` porque Gradle resuelve `storeFile` relativo al
        # directorio del módulo, no al directorio `android/` padre.
        # Se borra al terminar el job.
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/flavor-news-hub.keystore
          echo "Keystore decodificada: $(stat -c%s android/app/flavor-news-hub.keystore) bytes"

      - name: Write key.properties
        # Creamos el fichero que `build.gradle` lee para firmar. Usamos
        # una ruta relativa al keystore recién decodificado.
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=flavor-news-hub.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with tag
        # El APK sale como `app-release.apk`; lo renombramos a
        # `flavor-news-hub-app-vX.Y.Z.apk`. El sufijo `-app-` distingue
        # el binario de Android del ZIP del plugin para que la página
        # de releases en GitHub no induzca a confusión: antes el APK
        # se llamaba igual que el repo y costaba diferenciarlo del
        # source-code zip que GitHub añade automáticamente.
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/flavor-news-hub-app-${GITHUB_REF_NAME}.apk

      - name: Setup PHP
        # Necesario para `composer install` del plugin WordPress.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Build plugin ZIP for WordPress
        # El plugin Update Checker (PUC) que vive dentro del plugin
        # busca en cada release un asset que matchee
        # `flavor-news-hub-plugin-*.zip`. Sin este paso, PUC caía al
        # zipball por defecto del repo (que incluye `app/` y `backend/`
        # en raíz) y WordPress no encontraba el `.php` del plugin.
        # Estructura del ZIP: directorio raíz `flavor-news-hub/` con
        # los contenidos de `backend/` y `vendor/` instalado vía
        # `composer install --no-dev`.
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p plugin_build/flavor-news-hub
          cp -r backend/. plugin_build/flavor-news-hub/
          rm -rf plugin_build/flavor-news-hub/vendor \
                 plugin_build/flavor-news-hub/tests \
                 plugin_build/flavor-news-hub/phpunit.xml.dist \
                 plugin_build/flavor-news-hub/composer.lock \
                 plugin_build/flavor-news-hub/coverage
          composer install \
            --working-dir=plugin_build/flavor-news-hub \
            --no-dev --no-interaction --quiet
          cd plugin_build
          zip -rq flavor-news-hub-plugin-${GITHUB_REF_NAME}.zip flavor-news-hub \
            -x "*.DS_Store" "**/.git/*" "**/coverage/*"
          ls -lh flavor-news-hub-plugin-${GITHUB_REF_NAME}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          # `body:` se inserta al principio. `generate_release_notes:
          # true` mantiene el changelog automático debajo a partir de
          # los commits desde la release anterior. La sección custom
          # arriba aclara qué descargar — antes los visitantes veían
          # 4 assets (APK, ZIP, source.zip, source.tar.gz) sin pista
          # de cuál era para qué.
          body: |
            ### ¿Qué descargo?

            | Para… | Asset | Cómo se usa |
            |-------|-------|-------------|
            | 📱 **Instalar la app en Android** | `flavor-news-hub-app-${{ github.ref_name }}.apk` | Bájalo al móvil y ábrelo: el sistema te pedirá permiso para instalar. |
            | 🔌 **Añadir el plugin a tu WordPress** | `flavor-news-hub-plugin-${{ github.ref_name }}.zip` | wp-admin → Plugins → Añadir nuevo → Subir → Activar. |
            | 🛠️ **Compilar tú mismo o leer el código** | `Source code (zip / tar.gz)` | Es el repo entero. La mayoría de la gente no necesita esto. |

            ---

          generate_release_notes: true
          files: |
            app/build/app/outputs/flutter-apk/flavor-news-hub-app-${{ github.ref_name }}.apk
            plugin_build/flavor-news-hub-plugin-${{ github.ref_name }}.zip
